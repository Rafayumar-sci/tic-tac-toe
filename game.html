<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .game-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .status {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 30px;
        }

        .players-info {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 20px;
        }

        .player {
            flex: 1;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            text-align: center;
        }

        .player.active {
            background: #667eea;
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-symbol {
            font-size: 1.5em;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
            background: #ddd;
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            width: 100%;
            aspect-ratio: 1;
            background: white;
            border: none;
            border-radius: 8px;
            font-size: 2.5em;
            font-weight: bold;
            cursor: pointer;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .cell:hover:not(:disabled) {
            background: #f0f0f0;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .cell:active:not(:disabled) {
            transform: scale(0.95);
        }

        .cell:disabled {
            cursor: not-allowed;
        }

        .cell.x {
            color: #667eea;
        }

        .cell.o {
            color: #764ba2;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .game-mode-selector {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .game-mode-selector label {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .game-mode-selector input[type="radio"] {
            cursor: pointer;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .stat {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .game-over-message {
            text-align: center;
            font-size: 1.3em;
            color: #764ba2;
            font-weight: bold;
            margin-top: 15px;
            min-height: 30px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .cell {
                font-size: 2em;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎮 Tic Tac Toe</h1>

        <div class="game-info">
            <div class="status" id="status">Game Ready</div>

            <div class="players-info">
                <div class="player active" id="player1-info">
                    <div class="player-name">Player 1</div>
                    <div class="player-symbol">X</div>
                </div>
                <div class="player" id="player2-info">
                    <div class="player-name">Player 2</div>
                    <div class="player-symbol">O</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="game-mode-selector">
                <label>
                    <input type="radio" name="gameMode" value="human" checked>
                    <span>Player vs Player</span>
                </label>
                <label>
                    <input type="radio" name="gameMode" value="computer">
                    <span>vs Computer</span>
                </label>
            </div>
        </div>

        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <button id="resetBtn">🔄 New Game</button>

        <div class="game-over-message" id="gameOverMessage"></div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Player 1 Wins</div>
                <div class="stat-value" id="player1Wins">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Draws</div>
                <div class="stat-value" id="draws">0</div>
            </div>
        </div>
    </div>

    <script>
        class TicTacToe {
            constructor() {
                this.board = ['', '', '', '', '', '', '', '', ''];
                this.currentPlayer = 'X';
                this.gameOver = false;
                this.gameMode = 'human'; // 'human' or 'computer'
                this.player1Wins = 0;
                this.draws = 0;
                this.player2Name = 'Player 2';
            }

            reset() {
                this.board = ['', '', '', '', '', '', '', '', ''];
                this.currentPlayer = 'X';
                this.gameOver = false;
                this.updateUI();
            }

            setGameMode(mode) {
                this.gameMode = mode;
                this.player2Name = mode === 'computer' ? 'Computer' : 'Player 2';
                this.reset();
            }

            makeMove(index) {
                if (this.board[index] !== '' || this.gameOver) {
                    return false;
                }

                this.board[index] = this.currentPlayer;

                if (this.checkWinner()) {
                    this.gameOver = true;
                    if (this.currentPlayer === 'X') {
                        this.player1Wins++;
                    }
                    return true;
                }

                if (this.isBoardFull()) {
                    this.gameOver = true;
                    this.draws++;
                    return true;
                }

                this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                return true;
            }

            checkWinner() {
                const winPatterns = [
                    [0, 1, 2],
                    [3, 4, 5],
                    [6, 7, 8],
                    [0, 3, 6],
                    [1, 4, 7],
                    [2, 5, 8],
                    [0, 4, 8],
                    [2, 4, 6]
                ];

                for (let pattern of winPatterns) {
                    const [a, b, c] = pattern;
                    if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
                        return true;
                    }
                }
                return false;
            }

            isBoardFull() {
                return this.board.every(cell => cell !== '');
            }

            getEmptyCells() {
                return this.board
                    .map((cell, index) => cell === '' ? index : null)
                    .filter(val => val !== null);
            }

            getAIMove() {
                const emptyCells = this.getEmptyCells();

                // Check if AI can win
                for (let cell of emptyCells) {
                    this.board[cell] = 'O';
                    if (this.checkWinner()) {
                        this.board[cell] = '';
                        return cell;
                    }
                    this.board[cell] = '';
                }

                // Check if player can win and block
                for (let cell of emptyCells) {
                    this.board[cell] = 'X';
                    if (this.checkWinner()) {
                        this.board[cell] = '';
                        return cell;
                    }
                    this.board[cell] = '';
                }

                // Take center if available
                if (emptyCells.includes(4)) {
                    return 4;
                }

                // Take corners
                const corners = [0, 2, 6, 8].filter(i => emptyCells.includes(i));
                if (corners.length > 0) {
                    return corners[Math.floor(Math.random() * corners.length)];
                }

                // Take any available cell
                return emptyCells[Math.floor(Math.random() * emptyCells.length)];
            }

            updateUI() {
                const cells = document.querySelectorAll('.cell');
                cells.forEach((cell, index) => {
                    cell.textContent = this.board[index];
                    cell.className = 'cell';
                    if (this.board[index] === 'X') {
                        cell.classList.add('x');
                    } else if (this.board[index] === 'O') {
                        cell.classList.add('o');
                    }
                    cell.disabled = this.gameOver;
                });

                this.updateStatus();
                this.updatePlayerInfo();
                this.updateStats();
            }

            updateStatus() {
                const status = document.getElementById('status');
                if (this.gameOver) {
                    if (this.checkWinner()) {
                        const winner = this.currentPlayer === 'X' ? 'Player 1' : this.player2Name;
                        status.textContent = '🎉 ' + winner + ' Wins!';
                        document.getElementById('gameOverMessage').textContent = winner + ' won the game!';
                    } else if (this.isBoardFull()) {
                        status.textContent = '🤝 It\'s a Draw!';
                        document.getElementById('gameOverMessage').textContent = 'Game is a draw!';
                    }
                } else {
                    const currentName = this.currentPlayer === 'X' ? 'Player 1' : this.player2Name;
                    status.textContent = `Current Turn: ${currentName} (${this.currentPlayer})`;
                    document.getElementById('gameOverMessage').textContent = '';
                }
            }

            updatePlayerInfo() {
                const player1Info = document.getElementById('player1-info');
                const player2Info = document.getElementById('player2-info');

                player1Info.classList.toggle('active', this.currentPlayer === 'X' && !this.gameOver);
                player2Info.classList.toggle('active', this.currentPlayer === 'O' && !this.gameOver);

                player2Info.querySelector('.player-name').textContent = this.player2Name;
            }

            updateStats() {
                document.getElementById('player1Wins').textContent = this.player1Wins;
                document.getElementById('draws').textContent = this.draws;
            }
        }

        // Initialize game
        const game = new TicTacToe();

        // DOM Elements
        const cells = document.querySelectorAll('.cell');
        const resetBtn = document.getElementById('resetBtn');
        const gameModeInputs = document.querySelectorAll('input[name="gameMode"]');

        // Event listeners
        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        resetBtn.addEventListener('click', () => {
            game.reset();
            game.updateUI();
        });

        gameModeInputs.forEach(input => {
            input.addEventListener('change', (e) => {
                game.setGameMode(e.target.value);
            });
        });

        function handleCellClick(e) {
            const index = parseInt(e.target.dataset.index);

            if (game.makeMove(index)) {
                game.updateUI();

                // If vs Computer and game not over and current player is O
                if (game.gameMode === 'computer' && !game.gameOver && game.currentPlayer === 'O') {
                    setTimeout(() => {
                        const aiMove = game.getAIMove();
                        game.makeMove(aiMove);
                        game.updateUI();
                    }, 500);
                }
            }
        }

        // Initial UI update
        game.updateUI();
    </script>
</body>

</html>
